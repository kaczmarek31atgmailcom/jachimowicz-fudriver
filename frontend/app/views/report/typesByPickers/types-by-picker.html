<div class="container-fluid" ng-controller="TypesByPickerCtrl">
  <ol class="breadcrumb">
    <li><a href="#/report/typesByPickers">{{'report.types-by-pickers.breadcrumb.header' | translate}}</a></li>
    <li class="active">{{'report.types-by-picker.breadcrumb.header' | translate}} {{picker.id}} {{picker.name}} {{picker.surname}}</li>
  </ol>
  <div growl></div>

    <div class="row">

      <div class="loading" ng-hide="loading == 0">Loading&#8230;</div>
      <div class="row">
        <div class="form-group col-lg-3 col-xs-3">
          <input class="form-control" ng-model="pickerStartDate"  placeholder="{{pickerStartDate}}" required
                 bs-datepicker autoclose="true" data-date-format="yyyy/MM/dd" ng-change="updateDates()">
        </div>
        <div class="form-group col-lg-3 col-xs-3">
          <input type="text" class="form-control" ng-model="pickerEndDate"  placeholder="{{pickerEndDate}}"
                 required bs-datepicker autoclose="true" data-date-format="yyyy/MM/dd" ng-change="updateDates()">
        </div>

        <div class="col-lg-3 col-sm-3">
          <toggle-switch ng-model="showPcs" on-label="{{'report.type-by-pickers.pcs.on'|translate}}" off-label="{{'report.type-by-pickers.pcs.off'|translate}}"
                         ng-change="onSwitchChange()"></toggle-switch>
        </div>

        <div class="form-group col-lg-3 col-xs-3 text-right" ng-show="weightTable.length > 0">
          <i class="fa fa-file-excel-o fa-2x hand-cursor" ng-click="export()"></i>
          <i class="fa fa-print fa-2x hand-cursor" ng-print print-element-id="weightTable"></i>
        </div>


        <div class="col-lg-12 col-sm-12" ng-show="weightTable.length > 0">
      <table class="table table-bordered table-condensed table-hover export-table" id="weightTable">
        <tr>
          <td ng-repeat = "title in headerWeightTable track by $index" class="text-right"><strong>{{title}}</strong></td>
        </tr>
        <tr ng-repeat="row in weightTable track by $index">
          <td nowrap ng-repeat="value in row track by $index" ng-class="getClass($index+1,row.length)">{{value}}</td>
        </tr>
        <tr>
          <td ng-repeat="foot in footerWeightTable track by $index" ng-class="getClass($index+1,footerWeightTable.length)"><strong>{{foot}}</strong></td>
        </tr>
      </table>
    </div>
  </div>
</div>
