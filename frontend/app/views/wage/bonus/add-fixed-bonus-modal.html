<div class="modal" tabindex="-1" role="dialog" aria-hidden="true" ng-controller="AddBonusModalCtrl">
  <div class="modal-dialog modal-small">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" aria-label="Close" ng-click="$hide()"><span
          aria-hidden="true">&times;</span></button>
        <h3 class="modal-title text-muted" ng-bind="'payroll.bonus.add-fixed-modal-title' | translate"></h3>
      </div>

      <div class="modal-body">
        <form name="newWageHeaderForm" role="form">

          <div class="form-group">
            <label for="name" ng-bind="'payroll.bonus.add-fixed-modal-name' | translate"></label>
            <input type="text" class="form-control text-right input-xs" id="name" name="name" ng-model="name"
                   autocomplete="off" autofocus ng-change="validateFixedForm()">
          </div>

          <div class="form-group">
            <label for="name" ng-bind="'payroll.bonus.add-fixed-modal-value' | translate"></label>
            <input type="text" class="form-control text-right input-xs" id="value" name="value" ng-model="value"
                   autocomplete="off" ng-change="validateFixedForm()">
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button type="submit" class="btn btn-default" ng-click="$hide()">{{'payroll.bonus.add-fixed-modal-cancel' | translate}}</button>
        <button type="submit" class="btn btn-success" ng-disabled = "isFixedFormInvalid"
                ng-click="createFixedBonus(); $hide()">{{'payroll.bonus.add-fixed-modal-submit' | translate}}
        </button>
      </div>
    </div>
  </div>
</div>
