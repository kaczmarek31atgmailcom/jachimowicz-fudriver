<div class="container-fluid" ng-controller="BonusCtrl">
  <ol class="breadcrumb">
    <li class="active">{{'payroll.bonus.main.breadcrumb' | translate}}</li>
  </ol>

  <div growl></div>

  <div class="row">
    <div class="col-lg-2">
      <div class="form-group">
        <button class="btn btn-primary btn-block" ng-click="openAddFixedBonusModal()">
          <i class="fa fa-money" aria-hidden="true"></i>
          {{'payroll.bonus.add-fixed-bonus-button' | translate}}
        </button>
      </div>
      <div class="form-group">
        <button class="btn btn-primary btn-block" ng-click="openAddPercentBonusModal()">
          <i class="fa fa-percent" aria-hidden="true"></i>
          {{'payroll.bonus.add-percent-bonus-button' | translate}}
        </button>
      </div>
    </div>
    <div class="col-lg-9">
      <table class="table">
        <thead>
        <tr>
          <th class="col-sm-3">{{'payroll.bonus.name' | translate}}</th>
          <th class="text-right col-sm-3">{{'payroll.bonus.param' | translate}}</th>
          <th class="col-sm-6">&nbsp;</th>
        </tr>
        </thead>
        <tbody>
        <tr ng-repeat="bonus in bonuses">
          <td ng-show="bonus.type==='payroll_fixed_bonus'" class="col-sm-3"><i class="fa fa-money" aria-hidden="true"></i> {{bonus.name}}</td>
          <td ng-show="bonus.type==='payroll_percentage_bonus'" class="col-sm-3"><i class="fa fa-percent" aria-hidden="true"></i> {{bonus.name}}</td>
          <td ng-show="bonus.type==='payroll_fixed_bonus'" class="text-right col-sm-3">{{bonus.param | longToCurrency}} {{'payroll.bonus.currency' | translate}}</td>
          <td ng-show="bonus.type==='payroll_percentage_bonus'" class="text-right col-sm-3">{{bonus.param}}%</td>
          <td class="col-sm-6 text-right" ng-click="openConfirmDeletePrompt(bonus)"><i class="fa fa-trash-o fa-lg hand-cursor"
                                                                                                         aria-hidden="true"></i></td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
