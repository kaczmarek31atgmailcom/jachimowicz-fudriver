<div class="modal" tabindex="-1" role="dialog" aria-hidden="true" ng-controller="BonusDeleteCtrl">
  <div class="modal-dialog modal-small">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" aria-label="Close" ng-click="$hide()"><span
          aria-hidden="true">&times;</span></button>
        <h3 class="modal-title text-muted" ng-bind="'payroll.bonus.delete.header' | translate"></h3>
      </div>

      <div class="modal-body">

        <div class="text-center text-danger"><h2>{{'payroll.bonus.delete.prompt.message' | translate}}  {{bonusToDelete.name}}
          {{'payroll.bonus.delete.prompt.message2' | translate}} {{bonusToDelete.value}} ?</h2></div>

        <div class="modal-footer">
          <button type="submit" class="btn btn-default" ng-click="$hide()">{{'payroll.bonus.delete.cancel' | translate}}
          </button>
          <button type="submit" class="btn btn-danger"
                  ng-click="deleteBonus(bonusToDelete.id); $hide()">{{'payroll.bonus.delete.submit' | translate}}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
