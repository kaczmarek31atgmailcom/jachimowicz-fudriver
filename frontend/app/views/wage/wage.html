<div class="container-fluid" ng-controller="wageCtrl">
  <ol class="breadcrumb">
    <li class="active">{{'wage.breadcrumb.wage' | translate}}</li>
  </ol>
<div growl></div>
  <div class="row">
    <div class="col-lg-1">

      <div class="row">
        <div class="col-sm-12">
          <button class="btn btn-info btn-block" ng-click="openAddHeaderModal()">{{'wages.detail.submit' | translate}}</button>
        </div>
        <div class="col-sm-12">&nbsp</div>
        <div class="col-sm-12">
          <ul class="list-unstyled">
            <li ng-repeat="header in headers">
              <button ng-class="activeHeaderId === header.id ? 'btn btn-primary btn-block' : 'btn btn-default btn-block'" ng-click="setActiveHeader(header.id)">
                {{header.name}}
              </button>
              <span>&nbsp;</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <div class="col-lg-10">
      <table class="table table-condensed table-hover">
        <thead>
        <tr>
          <th class="col-lg-3 col-sm-3">
            {{'wages.type' | translate}}
          </th>
          <th class="col-lg-1 col-sm-1">
            {{'wages.typeWeight' | translate}}
          </th>
          <th ng-bind="'wages.regular' | translate" class="text-right col-sm-3 col-lg-3"></th>
          <th ng-bind="'wages.sunday' | translate" class="text-right col-sm-3 col-lg-3"></th>
          <th ng-bind="'wages.bonus' | translate" class="text-right col-sm-3 col-sm-3"></th>
        </tr>
        </thead>
        <tbody>
        <tr ng-repeat="type in types">
          <td>{{type.typeName}}</td>
          <td>{{type.typeWeight}}</td>
          <td class="text-right"><a href="#" editable-text="type.regularValue" onbeforesave="updateRegularWage(type.typeId,$data)"> {{type.regularValue}}</a></td>
          <td class="text-right"><a href="#" editable-text="type.sundayValue" onbeforesave="updateSundayWage(type.typeId,$data)"> {{type.sundayValue}}</a></td>
          <td class="text-right"><a href="#" editable-text="type.bonusValue" onbeforesave="updateBonusWage(type.typeId,$data)"> {{type.bonusValue}}</a></td>


        </tr>
        </tbody>
      </table>
    </div>
    <div class="col-lg-1"></div>
  </div>


</div>
