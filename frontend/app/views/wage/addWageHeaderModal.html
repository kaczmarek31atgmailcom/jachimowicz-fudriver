<div class="modal" tabindex="-1" role="dialog" aria-hidden="true" ng-controller="AddWageHeaderModalCtrl">
  <div class="modal-dialog modal-small">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" aria-label="Close" ng-click="$hide()"><span
          aria-hidden="true">&times;</span></button>
        <h3 class="modal-title text-muted" ng-bind="'wages.detail.submit' | translate"></h3>
      </div>

      <div class="modal-body">
        <form name="newWageHeaderForm" role="form">

          <div class="form-group">
            <label for="name" ng-bind="'wages.name' | translate"></label>
            <input type="text" class="form-control text-right input-xs" id="name" name="name" ng-model="name"
                   autocomplete="off" autofocus>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="submit" class="btn btn-default" ng-click="$hide()">{{'wages.cancel' | translate}}</button>
        <button type="submit" class="btn btn-success" ng-disabled = "!name"
                ng-click="addWageHeader(); $hide()">{{'wages.detail.submit' | translate}}
        </button>
      </div>
    </div>
  </div>
</div>
