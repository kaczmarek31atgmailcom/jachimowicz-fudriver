<div class="container-fluid" ng-controller="CurrencyCtrl">
  <ol class="breadcrumb">
    <li class="active">{{'settings.currency' | translate}}</li>
  </ol>
  <div growl></div>
  <div class="row">
    <div class="col-md-12">
      <div class="row">
        <div ng-repeat="(listName, list) in models.lists" class="col-md-6 dndlist">
          <div class="panel panel-info">
            <div class="panel-heading">
              <h3 class="panel-title">{{listName|translate}}</h3>
            </div>
            <div class="panel-body">

              <ul dnd-list="list">
                <li ng-repeat="item in list"
                    dnd-draggable="item"
                    dnd-moved="list.splice($index, 1); currencyMoved()"
                    dnd-effect-allowed="move"
                    dnd-selected="models.selected = item"
                    ng-class="{'selected': models.selected === item}">
                  <b>{{item.code}}</b> {{item.name}}
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
