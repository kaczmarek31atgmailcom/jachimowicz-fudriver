<div class="modal" tabindex="-1" role="dialog" aria-hidden="true" ng-controller="CustomerCtrl">
  <div class="modal-dialog modal-small">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" aria-label="Close" ng-click="$hide()"><span
          aria-hidden="true">&times;</span></button>
        <h3>{{'settings.customer.edit-modal-title' | translate}}</h3>
      </div>
      <div class="modal-body">
        <form name="changeCustomerData">

          <div class="form-group">
            <label for="name" ng-bind="'settings.customer.name' | translate" class="text-muted"></label>
            <input type="text"  class="form-control text-right input-xs" id="name" name="name"
                   ng-model="name" autocomplete="off" autofocus>
          </div>

          <div class="form-group">
            <label for="address" ng-bind="'settings.customer.address' | translate" class="text-muted"></label>
            <input type="text"  class="form-control text-right input-xs" id="address" name="address"
                   ng-model="address" autocomplete="off">
          </div>
        </form>
      </div>


      <div class="modal-footer">
        <button type="submit" class="btn btn-default" ng-click="$hide()">{{'settings.customer.modal.cancel' | translate}}</button>
        <button type="submit" class="btn btn-success"
                ng-click="createCustomer(name,address); $hide()">{{'settings.customer.modal.save' | translate}}
        </button>
      </div>
    </div>
  </div>
</div>
