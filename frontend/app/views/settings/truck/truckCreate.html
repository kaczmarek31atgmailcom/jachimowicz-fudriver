<!DOCTYPE html>
<div class="container-fluid" ng-controller="CreateTruckCtrl">
  <ol class="breadcrumb">
    <li><a href="#/truck">{{'settings.truck.menu' | translate}}</a></li>
    <li class="active">{{'settings.truck.add' | translate}}</li>
  </ol>
  <div class="row">
<div growl></div>

    <form role="form">
      <div class="col-lg-4 col-lg-offset-4">

        <div class="form-group">
          <label for="plate">{{'settings.truck.plate'|translate}}</label>
          <input type="text" id="plate" required ng-model="plate" class="form-control" ng-blur="checkPlate()">
        </div>
        <div class="form-group">
          <label for="capacity">{{'settings.truck.capacity'|translate}}</label>
          <input type="text" id="capacity" ng-model="capacity" class="form-control">
        </div>
        <div class="form-group">
          <label for="description">{{'settings.truck.description'|translate}}</label>
          <textarea id="description" ng-model="description" class="form-control"></textarea>
        </div>
        <div class="text-right">
          <button class="btn btn-primary" ng-disabled="! validPlate" ng-click="createTruck()"><i class="fa fa-plus" aria-hidden="true"></i> {{'settings.truck.create.button' | translate}}</button>
        </div>
      </div>
    </form>

  </div>

</div>
