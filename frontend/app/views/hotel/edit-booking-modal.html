<div class="modal" tabindex="-1" role="dialog" aria-hidden="true" ng-controller="EditHotelBookingCtrl" ng-init="init()">
  <div class="modal-dialog modal-small">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" aria-label="Close" ng-click="$hide()"><span
          aria-hidden="true">&times;</span></button>
        <h3 class="modal-title text-muted" ng-bind="'hotel.modal.reservation-edit.header' | translate"></h3>
          <p class="modal-title text-muted" ng-show="reservation.personId > 0">{{reservation.personId}} {{reservation.personName}} {{reservation.personSurname}}</p>

      </div>
      <div class="modal-body">
        <form name="reservationForm" role="form">
          <div class="form-group">
            <label for="startDate" class="text-muted"><i class="fa fa-calendar"></i> {{'hotel.modal.reservation.startDate' | translate}}</label>
            <input class="form-control" id="startDate" ng-model="reservation.reservationStartDate" placeholder="{{reservation.reservationStartDate}}" required
                   data-min-date="{{minDate}}" data-max-date="{{reservation.reservationEndDate}}" bs-datepicker autoclose="true" data-date-format="yyyy/MM/dd">
          </div>
          <div class="form-group">
            <label for="endDate" class="text-muted"><i class="fa fa-calendar"></i> {{'hotel.modal.reservation.endDate' | translate}}</label>
            <input type="text" id="endDate" class="form-control" ng-model="reservation.reservationEndDate" placeholder="{{reservation.reservationEndDate}}"
                   required bs-datepicker autoclose="true" date-format="yyyy/MM/dd" data-min-date="{{reservation.reservationStartDate}}" data-max-date="{{maxDate}}">
          </div>
          <div class="form-group">
            <label for="description" class="text-muted"><i class="fa fa-sticky-note-o"></i> {{'hotel.modal.reservation.description' | translate}}</label>
            <textarea id="description" class="form-control" ng-model="reservation.description"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <div class="row">
          <div class="text-left col-sm-3">
            <button type="submit" class="btn btn-danger"
                    ng-click="deleteReservation(); $hide()"><i class="fa fa-remove"></i> {{'hotel.modal.reservation.delete' | translate}}
            </button>
          </div>
          <div class="text-right col-sm-9">
            <button type="submit" class="btn btn-default" ng-click="$hide()">{{'hotel.modal.reservation.cancel' | translate}}</button>
            <button type="submit" class="btn btn-success" ng-disabled="!reservation.reservationStartDate || !reservation.reservationEndDate "
                    ng-click="updateBooking(); $hide()">{{'hotel.modal.reservation-edit.save' | translate}}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
