<!DOCTYPE html>
<html lang="en">
<div class="container-fluid" ng-controller="WorkTimeCtrl">
  <ol class="breadcrumb">
    <li class="active">{{'people.worktime.breadcrumb' | translate}}</li>
  </ol>
  <table class="table table-striped table-bordered table-hover table-condensed" ng-show="people.length>0">
    <thead>
    <tr>
      <th>
        <a href="" ng-click="orderByField='id'; reverseSort = !reverseSort">
          {{'peopleHeaders.id'|translate}}
          <span ng-show="orderByField=='id' && !reverseSort" class="fa fa-caret-down"></span>
          <span ng-show="orderByField=='id' && reverseSort" class="fa fa-caret-up"></span>
        </a>
      </th>
      <th>
        <a href="" ng-click="orderByField='nr'; reverseSort = !reverseSort">
          {{'peopleHeaders.nr'|translate}}
          <span ng-show="orderByField=='nr' && !reverseSort" class="fa fa-caret-down"></span>
          <span ng-show="orderByField=='nr' && reverseSort" class="fa fa-caret-up"></span>
        </a>
      </th>
      <th>
        <a href="" ng-click="orderByField='name'; reverseSort = !reverseSort">
          {{'peopleHeaders.name'|translate}}
          <span ng-show="orderByField=='name' && !reverseSort" class="fa fa-caret-down"></span>
          <span ng-show="orderByField=='name' && reverseSort" class="fa fa-caret-up"></span>
        </a>
      </th>

      <th>
        <a href="" ng-click="orderByField='surname'; reverseSort = !reverseSort">
          {{'peopleHeaders.surname'|translate}}
          <span ng-show="orderByField=='surname' && !reverseSort" class="fa fa-caret-down"></span>
          <span ng-show="orderByField=='surname' && reverseSort" class="fa fa-caret-up"></span>
        </a>
      </th>

      <th>
        <a href="" ng-click="orderByField='groupName'; reverseSort = !reverseSort">
          {{'peopleHeaders.group'|translate}}
          <span ng-show="orderByField=='groupName' && !reverseSort" class="fa fa-caret-down"></span>
          <span ng-show="orderByField=='groupName' && reverseSort" class="fa fa-caret-up"></span>
        </a>
      </th>
    </tr>
    </thead>
    <tbody>
    <tr ng-repeat="person in people |filter:searchText | orderBy:orderByField:reverseSort" ng-show="showRow(person.active) == true"
        ng-class="person.isPresent ? 'text-primary hand-cursor':'hand-cursor'" ng-click="editTimeSheet(person)">
      <td>
        <i class="fa fa-user-plus" aria-hidden="true" ng-show="person.isPresent"></i>
        <i class="fa fa-user-times" aria-hidden="true" ng-hide="person.isPresent"></i>
        {{person.id}}
      </td>
      <td class="text-right" ng-bind="person.nr"></td>
      <td ng-bind="person.name"></td>
      <td ng-bind="person.surname"></td>
      <td ng-bind="person.groupName"></td>
    </tr>
    </tbody>
  </table>
</div>
