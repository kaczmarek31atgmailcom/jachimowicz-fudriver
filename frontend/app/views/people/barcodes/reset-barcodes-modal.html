<div class="modal" tabindex="-1" role="dialog" aria-hidden="true" ng-controller="ResetBarcodeCtrl" id="resetBarcodeModal" >
  <div class="modal-dialog modal-small">
    <div class="modal-content">
      <div class="modal-header bg-primary">
        <button type="button" class="close" aria-label="Close" ng-click="$hide()"><span
          aria-hidden="true" class="text-white">&times;</span></button>
      </div>
      <div class="modal-body">
        <h3 class="text-center text-muted">{{'people.barcodes.reset.modal.header' | translate}} {{person.name}} {{person.surname}} id {{person.id}} </h3>
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-default" ng-click="hideLoading(); $hide()">{{'people.barcodes.reset.modal.cancel' | translate}}</button>
        <button type="submit" class="btn btn-danger" ng-click="reset(person.id);$hide()">{{'people.barcodes.reset.modal.submit' | translate}}</button>
      </div>
    </div>
  </div>
</div>
