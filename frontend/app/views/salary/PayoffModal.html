<div class="modal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-small">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" aria-label="Close" ng-click="$hide()"><span
          aria-hidden="true">&times;</span></button>
        <h3 class="modal-title text-muted" ng-bind="'payroll.salary.account.modal.header' | translate"></h3>
      </div>

      <div class="modal-body">
        <form>
          <div class="form-group">

            <label for="value">{{'payroll.salary.account.payoff.modal.message' | translate}} {{params.person.personName}} {{params.person.personSurname}}</label>
            <input type="text" class="form-control text-right" ng-model="amount" id="value">
          </div>
        </form>
        <div class="modal-footer">
          <button type="submit" class="btn btn-default" ng-click="$hide()">{{'payroll.salary.account.payoff.modal.cancel' | translate}}
          </button>
          <button type="submit" class="btn btn-primary"
                  ng-click="doPayoff(); $hide()">{{'payroll.salary.account.payoff.modal.submit' | translate}}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
