<div class="modal" tabindex="-1" role="dialog" aria-hidden="true" ng-controller="EditProductionOrderLocalCtrl">
  <div class="modal-dialog modal-small">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" aria-label="Close" ng-click="$hide()"><span
          aria-hidden="true">&times;</span></button>
        <h3 class="modal-title text-muted text-center">{{day}} - {{order.typeName}} {{order.typeWeight | longToWeight}}
          <hr>
        </h3>
      </div>

      <div class="modal-body">
        <form name="orderForm" autocomplete="off" class="form-inline text-center" ng-submit="updateOrder(); $hide()">
          <div class="form-group text-center">
            <label for="dueAmount">
            </label>
            <input id="dueAmount" class="form-control" type="text" oninput="this.value=this.value.replace(/[^0-9]/g,'');" min="0" autocomplete="off" ng-model="order.amount"/>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-default" ng-click="$hide()">{{'production.order.local.modal.close' | translate}}</button>
        <button type="submit" class="btn btn-success" ng-click="updateOrder(order.amount); $hide()">{{'production.order.local.modal.save' | translate}}
        </button>
      </div>
    </div>
  </div>
</div>
