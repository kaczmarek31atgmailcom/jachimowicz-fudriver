<div class="modal" tabindex="-1" role="dialog" aria-hidden="true" ng-controller="CreateBoxCtrl">
  <div class="modal-dialog modal-small">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" aria-label="Close" ng-click="$hide()"><span
          aria-hidden="true">&times;</span></button>
        <h3>{{'admin.box.create-modal-title' | translate}}</h3>
      </div>
      <div class="modal-body">
        <form name="createBox">
          <div class="form-group">
            <label for="name" ng-bind="'admin.box.name' | translate" class="text-muted"></label>
            <input type="text" class="form-control text-right input-xs" id="name" name="name"
                   ng-model="name" autocomplete="off">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-default" ng-click="$hide()">{{'admin.box.modal.cancel' | translate}}</button>
        <button type="submit" class="btn btn-success"
                ng-click="create(); $hide()">{{'admin.box.modal.save' | translate}}
        </button>
      </div>
    </div>
  </div>
</div>
