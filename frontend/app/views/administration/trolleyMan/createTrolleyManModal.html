<div class="modal" tabindex="-1" role="dialog" aria-hidden="true" ng-controller="CreateTrolleyManCtrl">
  <div class="modal-dialog modal-small">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" aria-label="Close" ng-click="$hide()"><span
          aria-hidden="true">&times;</span></button>
        <h3>{{'admin.trolleyMan.create-modal-title' | translate}}</h3>
      </div>
      <div class="modal-body">
        <form name="createTrolleyMan">
          <div class="form-group">
            <label for="name" ng-bind="'admin.trolleyMan.name' | translate" class="text-muted"></label>
            <input type="text" class="form-control text-right input-xs" id="name" name="name"
                   ng-model="name" autocomplete="off">
          </div>
          <div class="form-group">
            <label for="name" ng-bind="'admin.trolleyMan.surname' | translate" class="text-muted"></label>
            <input type="text" class="form-control text-right input-xs" id="surname" name="surname"
                   ng-model="surname" autocomplete="off">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-default" ng-click="$hide()">{{'admin.trolleyMan.modal.cancel' | translate}}</button>
        <button type="submit" class="btn btn-success" ng-disabled="!((name.length + surname.length)> 0)"
                ng-click="create(name,surname); $hide()">{{'admin.trolleyMan.modal.submit' | translate}}
        </button>
      </div>
    </div>
  </div>
</div>
