<div class="modal" tabindex="-1" role="dialog" aria-hidden="true" ng-controller="TypeGroupDeleteCtrl">
  <div class="modal-dialog modal-small">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" aria-label="Close" ng-click="$hide()"><span
          aria-hidden="true">&times;</span></button>
        <h3 class="modal-title text-muted" ng-bind="'admin.typeGroup.delete.header' | translate"></h3>
      </div>

      <div class="modal-body">

        <div class="text-center text-danger"><h2>{{'admin.typeGroup.delete.prompt.message' | translate}}  {{typeGroup.name}}?</h2></div>

        <div class="modal-footer">
          <button type="submit" class="btn btn-default" ng-click="$hide()">{{'admin.typeGroup.delete.prompt.cancel' | translate}}
          </button>
          <button type="submit" class="btn btn-danger"
                  ng-click="deleteTypeGroup(typeGroup); $hide()">{{'admin.typeGroup.delete.prompt.submit' | translate}}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
